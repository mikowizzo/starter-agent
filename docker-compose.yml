services:
  backend:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - starter-app-net

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:3000:5173"
    volumes:
      - ./frontend:/workspace/frontend
      - /workspace/frontend/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - starter-app-net

networks:
  starter-app-net:
    name: starter-app-net
    driver: bridge
